<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pecelec Studio Wave-O-Matic</title>
<style>
:root{--bg:#161a1b;--deck:#202526;--deck2:#252b2c;--deck3:#111414;--line:#495051;--line2:#303637;--text:#d8ddda;--muted:#8c9692;--green:#00e06f;--green2:#70ffad;--red:#ff6161;--amber:#ffbf47;--field:#0b0e0e;--grid:rgba(210,220,216,.13);--mono:"Cascadia Mono","SF Mono","Roboto Mono",Consolas,monospace;--ui:"Bahnschrift","Aptos","Segoe UI",Arial,sans-serif}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ui);font-size:13px;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:342px 1fr;grid-template-rows:34px 1fr;gap:6px;padding:6px}.top{grid-column:1/-1;border:1px solid var(--line);background:#0e1111;display:grid;grid-template-columns:auto 1fr auto;align-items:center}.mark{height:100%;display:flex;align-items:center;padding:0 12px;border-right:1px solid var(--line);color:var(--green);font-family:var(--mono);font-weight:800;letter-spacing:.12em;font-size:12px;text-transform:uppercase}.toolname{padding:0 12px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:#f0f4f2;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.runlamp{display:flex;align-items:center;gap:8px;padding:0 12px;height:100%;border-left:1px solid var(--line);font-family:var(--mono);font-size:11px;color:var(--muted)}.lamp{width:8px;height:8px;background:var(--green);box-shadow:0 0 9px rgba(0,224,111,.8)}.side,.main{border:1px solid var(--line);background:var(--deck);min-height:0}.side{overflow:auto;padding:6px;display:grid;gap:6px;align-content:start}.main{display:grid;grid-template-rows:1fr 188px;gap:6px;padding:6px;min-width:0}.block{border:1px solid var(--line2);background:var(--deck2)}.head{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 7px;border-bottom:1px solid var(--line2);background:var(--deck3);font-family:var(--mono);color:var(--muted);font-size:10px;letter-spacing:.09em;text-transform:uppercase}.head b{font-weight:800;color:var(--green)}.body{padding:7px;display:grid;gap:7px}.row{display:grid;grid-template-columns:1fr 1fr;gap:7px}.triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}label{display:grid;gap:3px;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase}.checkline{display:flex;align-items:center;gap:7px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;border:1px solid #586062;background:var(--field);color:var(--text);border-radius:0;outline:0;font-family:var(--mono)}input,select{height:28px;padding:4px 6px;font-size:12px}input[type=checkbox]{width:auto;height:auto;accent-color:var(--green)}input[type=file]{height:auto;padding:5px;font-size:10px}textarea{height:132px;resize:none;padding:7px;font-size:11px;line-height:1.4;color:#c6ceca}input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:inset 0 -2px 0 var(--green)}button{height:30px;border:1px solid var(--green);background:#07120c;color:var(--green2);font-family:var(--mono);font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:0}button:hover{background:#0d2015}button:active{transform:translateY(1px)}button.alt{border-color:#697172;background:#151919;color:#d8ddda}.triple button{font-size:9px;padding:0 4px}.chartbox{display:grid;grid-template-rows:24px 1fr;min-height:0}canvas{width:100%;height:100%;display:block;background:#080a0a;border:0;min-height:0}.preview{display:grid;grid-template-columns:1fr 292px;gap:6px;min-height:0}.log{min-height:0}.buttons{display:grid;gap:7px;align-content:start}.msg{font-family:var(--mono);font-size:11px;min-height:16px;color:var(--amber);line-height:1.35}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}.smallread{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.35;min-height:1.2em}.modepill{display:inline-block;border:1px solid var(--line);padding:2px 5px;color:var(--green);background:#08110c}@media(max-width:920px){body{overflow:auto}.app{height:auto;grid-template-columns:1fr;grid-template-rows:34px auto auto}.top{grid-column:auto}.main{min-height:700px}.preview{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="mark"><a href="www.pecelec.co.uk">Pecelec Studio</div><div class="toolname">Wave-O-Matic</div><div class="runlamp"><span class="lamp"></span><span id="topStatus">READY</span></div></div>
  <aside class="side">
    <section class="block"><div class="head"><span>Source</span><b>00</b></div><div class="body">
      <label>Mode<select id="sourceMode"><option value="generated">Generated Wave</option><option value="wav">WAV Import</option></select></label>
    </div></section>

    <section class="block"><div class="head"><span>Wave</span><b>01</b></div><div class="body">
      <label>Type<select id="waveform"><option value="sine">Sine</option><option value="sawtooth">Sawtooth</option><option value="triangle">Triangle</option><option value="square">Square</option><option value="sharkfin">Sharkfin</option></select></label>
      <div class="row"><label>Amplitude<input id="amplitude" type="number" value="1" step="0.1"></label><label>Offset<input id="offset" type="number" value="0" step="0.1"></label></div>
      <div class="row"><label>Frequency Hz<input id="frequency" type="number" value="10" min="0" step="0.1"></label><label>Phase Deg<input id="phase" type="number" value="0" step="1"></label></div>
      <div class="row"><label>Duty %<input id="duty" type="number" value="50" min="1" max="99" step="1"></label><label>Shark Exp<input id="sharkExp" type="number" value="5" min="0.1" max="20" step="0.1"></label></div>
      <div class="row"><label>Square Rise S<input id="squareRise" type="number" value="0" min="0" step="0.001"></label><label>Square Fall S<input id="squareFall" type="number" value="0" min="0" step="0.001"></label></div>
    </div></section>

    <section class="block"><div class="head"><span>Harmonics</span><b>02</b></div><div class="body">
      <label class="checkline"><input id="harmonicsEnable" type="checkbox"> Enable Harmonics</label>
      <div class="row"><label>Count<input id="harmonicCount" type="number" value="0" min="0" max="64" step="1"></label><label>Amount %<input id="harmonicAmount" type="number" value="30" min="0" max="500" step="1"></label></div>
      <div class="row"><label>Rolloff<input id="harmonicRolloff" type="number" value="1" min="0" max="4" step="0.1"></label><label>Odd Only<select id="harmonicOddOnly"><option value="0">No</option><option value="1">Yes</option></select></label></div>
    </div></section>

    <section class="block"><div class="head"><span>Sweep</span><b>03</b></div><div class="body">
      <label class="checkline"><input id="sweepEnable" type="checkbox"> Frequency Sweep</label>
      <div class="row"><label>Start Hz<input id="sweepStart" type="number" value="1" min="0" step="0.1"></label><label>Finish Hz<input id="sweepEnd" type="number" value="10" min="0" step="0.1"></label></div>
      <div class="row"><label>Sweep Time S<input id="sweepTime" type="number" value="1" min="0.000001" step="0.001"></label><label>Shape<select id="sweepShape"><option value="linear">Linear</option><option value="log">Log</option></select></label></div>
      <label class="checkline"><input id="sweepSetsDuration" type="checkbox" checked> Sweep Time Sets Duration</label>
    </div></section>

    <section class="block"><div class="head"><span>Timebase</span><b>04</b></div><div class="body">
      <div class="row"><label>Start S<input id="startTime" type="number" value="0" step="0.001"></label><label>Duration S<input id="duration" type="number" value="0.1" min="0.000001" step="0.001"></label></div>
      <label class="checkline"><input id="autoSingleCycle" type="checkbox" checked> Auto Single Cycle</label>
      <label>Sample Rate SPS<input id="sampleRate" type="number" value="1000" min="1" step="1"></label>
      <label>Plot Limit<input id="chartPoints" type="number" value="2500" min="50" max="30000" step="50"></label>
    </div></section>

    <section class="block"><div class="head"><span>ADSR</span><b>05</b></div><div class="body">
      <div class="row"><label>Attack S<input id="attack" type="number" value="0" min="0" step="0.001"></label><label>Decay S<input id="decay" type="number" value="0" min="0" step="0.001"></label></div>
      <div class="row"><label>Sustain %<input id="sustain" type="number" value="100" min="0" max="100" step="1"></label><label>Release S<input id="release" type="number" value="0" min="0" step="0.001"></label></div>
      <label>Env Exp<input id="envExp" type="number" value="4" min="0.1" max="20" step="0.1"></label>
    </div></section>

    <section class="block"><div class="head"><span>WAV Import</span><b>06</b></div><div class="body">
      <label>Upload WAV<input id="wavFile" type="file" accept="audio/wav,audio/x-wav,audio/*"></label>
      <div class="row"><label>Gain<input id="wavGain" type="number" value="1" step="0.1"></label><label>Offset<input id="wavOffset" type="number" value="0" step="0.1"></label></div>
      <label>Playback<select id="wavPlaybackMode"><option value="sampleRate">Use output sample rate as playback rate</option><option value="preserveDuration">Preserve original duration</option></select></label>
      <div id="wavInfo" class="smallread">no wav loaded</div>
    </div></section>

    <section class="block"><div class="head"><span>CSV</span><b>07</b></div><div class="body">
      <label>Format<select id="csvFormat"><option value="linmotVector">LinMot vector, no header</option><option value="linmotVectorHeader">LinMot vector, header</option><option value="timeValue">time_s,value</option><option value="timeValueNoHeader">time,value no header</option></select></label>
      <label>Filename<input id="filename" type="text" value="auto-generated.csv"></label>
    </div></section>

    <section class="block"><div class="head"><span>Setups</span><b>08</b></div><div class="body">
      <label>Preset Name<input id="presetName" type="text" value="" placeholder="e.g. soft-square-01"></label>
      <label>Saved Presets<select id="presetSelect"></select></label>
      <div class="triple"><button id="savePresetBtn">Save</button><button id="loadPresetBtn" class="alt">Load</button><button id="deletePresetBtn" class="alt">Delete</button></div>
    </div></section>
  </aside>

  <main class="main">
    <section class="block chartbox"><div class="head"><span>Scope</span><b id="pointsShort">0 pts</b></div><canvas id="chart"></canvas></section>
    <section class="preview">
      <div class="block log"><div class="head"><span>CSV Preview</span><b id="formatShort">VECTOR</b></div><textarea id="csvPreview" readonly spellcheck="false"></textarea></div>
      <div class="block"><div class="head"><span>Output</span><b>09</b></div><div class="body buttons"><button id="downloadBtn">Download CSV</button><button id="downloadWavBtn">Download WAV</button><button id="copyBtn" class="alt">Copy CSV</button><div id="msg" class="msg"></div></div></div>
    </section>
  </main>
</div>

<script>
const $=id=>document.getElementById(id);
const els={sourceMode:$('sourceMode'),waveform:$('waveform'),amplitude:$('amplitude'),offset:$('offset'),frequency:$('frequency'),phase:$('phase'),duty:$('duty'),sharkExp:$('sharkExp'),squareRise:$('squareRise'),squareFall:$('squareFall'),harmonicsEnable:$('harmonicsEnable'),harmonicCount:$('harmonicCount'),harmonicAmount:$('harmonicAmount'),harmonicRolloff:$('harmonicRolloff'),harmonicOddOnly:$('harmonicOddOnly'),sweepEnable:$('sweepEnable'),sweepStart:$('sweepStart'),sweepEnd:$('sweepEnd'),sweepTime:$('sweepTime'),sweepShape:$('sweepShape'),sweepSetsDuration:$('sweepSetsDuration'),startTime:$('startTime'),duration:$('duration'),autoSingleCycle:$('autoSingleCycle'),sampleRate:$('sampleRate'),chartPoints:$('chartPoints'),attack:$('attack'),decay:$('decay'),sustain:$('sustain'),release:$('release'),envExp:$('envExp'),wavFile:$('wavFile'),wavGain:$('wavGain'),wavOffset:$('wavOffset'),wavPlaybackMode:$('wavPlaybackMode'),wavInfo:$('wavInfo'),csvFormat:$('csvFormat'),filename:$('filename'),presetName:$('presetName'),presetSelect:$('presetSelect'),savePresetBtn:$('savePresetBtn'),loadPresetBtn:$('loadPresetBtn'),deletePresetBtn:$('deletePresetBtn'),downloadBtn:$('downloadBtn'),downloadWavBtn:$('downloadWavBtn'),copyBtn:$('copyBtn'),chart:$('chart'),csvPreview:$('csvPreview'),msg:$('msg'),pointsShort:$('pointsShort'),formatShort:$('formatShort'),topStatus:$('topStatus')};
let filenamePrefix='',latest='',latestRows=[],wavState=null;
const STORAGE_LAST='pecelec.waveomatic.lastSetup.v3',STORAGE_PRESETS='pecelec.waveomatic.presets.v3';
const SETUP_IDS=['sourceMode','waveform','amplitude','offset','frequency','phase','duty','sharkExp','squareRise','squareFall','harmonicsEnable','harmonicCount','harmonicAmount','harmonicRolloff','harmonicOddOnly','sweepEnable','sweepStart','sweepEnd','sweepTime','sweepShape','sweepSetsDuration','startTime','duration','autoSingleCycle','sampleRate','chartPoints','attack','decay','sustain','release','envExp','wavGain','wavOffset','wavPlaybackMode','csvFormat'];
function num(el,f){const n=Number(el.value);return Number.isFinite(n)?n:f}
function clamp(v,a,b){return Math.min(b,Math.max(a,v))}
function wrap01(x){return x-Math.floor(x)}
function fmt(n){if(!Number.isFinite(n))return'0';const a=Math.abs(n);if(a&&(a<1e-6||a>=1e7))return n.toExponential(9);return Number(n.toFixed(9)).toString()}
function fmtAxisY(n){return Number.isFinite(n)?Number(n).toFixed(2):'0.00'}
function slug(v){return String(v).trim().toLowerCase().replace(/[^a-z0-9.+-]+/g,'-').replace(/^-+|-+$/g,'')||'x'}
function cleanNum(v){return slug(fmt(v)).replace(/\./g,'p').replace(/\+/g,'')}
function randomFiveDigits(){const a=new Uint32Array(1);crypto.getRandomValues(a);return String(a[0]%100000).padStart(5,'0')}
function settingsFilename(ext='csv'){const c=cfg(false);const source=c.sourceMode==='wav'?'wav':c.waveform;return `${filenamePrefix||randomFiveDigits()}-${source}-${cleanNum(c.frequency)}hz-${cleanNum(c.amplitude)}amp-${cleanNum(c.offset)}offset-${cleanNum(c.phaseDeg)}phase-${cleanNum(c.duration)}s.${ext}`}
function assignFreshFilename(changePrefix=true){if(changePrefix||!filenamePrefix)filenamePrefix=randomFiveDigits();const name=settingsFilename('csv');els.filename.value=name;return name}
function setMsg(t,cls=''){els.msg.textContent=t;els.msg.className='msg '+cls;els.topStatus.textContent=cls==='err'?'FAULT':(cls==='ok'?'DONE':'READY')}
function cfg(readFilename=true){return{sourceMode:els.sourceMode.value,waveform:els.waveform.value,amplitude:num(els.amplitude,1),offset:num(els.offset,0),frequency:Math.max(0,num(els.frequency,1)),phaseDeg:num(els.phase,0),duty:clamp(num(els.duty,50)/100,.01,.99),sharkExp:clamp(num(els.sharkExp,5),.1,20),squareRise:Math.max(0,num(els.squareRise,0)),squareFall:Math.max(0,num(els.squareFall,0)),harmonicsEnable:!!els.harmonicsEnable.checked,harmonicCount:clamp(Math.floor(num(els.harmonicCount,0)),0,64),harmonicAmount:Math.max(0,num(els.harmonicAmount,30))/100,harmonicRolloff:clamp(num(els.harmonicRolloff,1),0,4),harmonicOddOnly:els.harmonicOddOnly.value==='1',sweepEnable:!!els.sweepEnable.checked,sweepStart:Math.max(0,num(els.sweepStart,1)),sweepEnd:Math.max(0,num(els.sweepEnd,10)),sweepTime:Math.max(1e-9,num(els.sweepTime,1)),sweepShape:els.sweepShape.value,sweepSetsDuration:!!els.sweepSetsDuration.checked,startTime:num(els.startTime,0),duration:Math.max(1e-9,num(els.duration,1)),autoSingleCycle:!!els.autoSingleCycle.checked,sampleRate:Math.max(1,Math.floor(num(els.sampleRate,1000))),chartPoints:clamp(Math.floor(num(els.chartPoints,2500)),50,30000),attack:Math.max(0,num(els.attack,0)),decay:Math.max(0,num(els.decay,0)),sustain:clamp(num(els.sustain,100)/100,0,1),release:Math.max(0,num(els.release,0)),envExp:clamp(num(els.envExp,4),.1,20),wavGain:num(els.wavGain,1),wavOffset:num(els.wavOffset,0),wavPlaybackMode:els.wavPlaybackMode.value,csvFormat:els.csvFormat.value,filename:readFilename?(els.filename.value.trim()||assignFreshFilename(false)):''}}
function exp01(x,k){x=clamp(x,0,1);if(Math.abs(k)<1e-9)return x;return (Math.exp(k*x)-1)/(Math.exp(k)-1)}
function smooth01(x){x=clamp(x,0,1);return x*x*(3-2*x)}
function phaseAt(t,c,mult=1){const tau=Math.max(0,t-c.startTime);if(!c.sweepEnable){return mult*(c.frequency*t+c.phaseDeg/360)}const T=c.sweepTime,local=Math.min(tau,T);let cycles;if(c.sweepShape==='log'&&c.sweepStart>0&&c.sweepEnd>0&&c.sweepStart!==c.sweepEnd){const r=c.sweepEnd/c.sweepStart;cycles=c.sweepStart*T*(Math.pow(r,local/T)-1)/Math.log(r)}else{const k=(c.sweepEnd-c.sweepStart)/T;cycles=c.sweepStart*local+0.5*k*local*local}if(tau>T)cycles+=c.sweepEnd*(tau-T);return mult*(cycles+c.phaseDeg/360)}
function unit(type,p,d,k,c){p=wrap01(p);if(type==='sine')return Math.sin(2*Math.PI*p);if(type==='sawtooth')return 2*p-1;if(type==='triangle')return 1-4*Math.abs(p-.5);if(type==='square'){const baseF=c.sweepEnable?Math.max(c.sweepStart,c.sweepEnd,c.frequency):c.frequency;if(baseF<=0)return p<d?1:-1;const rise=clamp(c.squareRise*baseF,0,d);const fall=clamp(c.squareFall*baseF,0,1-d);if(rise>0&&p<rise)return -1+2*smooth01(p/rise);if(p<d)return 1;if(fall>0&&p<d+fall)return 1-2*smooth01((p-d)/fall);return -1}if(type==='sharkfin'){if(p<d)return -1+2*exp01(p/d,k);return 1-2*exp01((p-d)/(1-d),k)}return 0}
function harmonicWeight(n,c){return 1/Math.pow(n,Math.max(0.0001,c.harmonicRolloff))}
function harmonicSign(type,n){if(type==='triangle'){const k=(n-1)/2;return k%2===0?1:-1}if(type==='sawtooth')return n%2===0?-1:1;return 1}
function harmonicAllows(type,n,c){if(type==='square'||type==='triangle')return n%2===1;if(c.harmonicOddOnly)return n%2===1;return true}
function harmonicWave(t,c){const type=c.waveform,N=Math.max(1,c.harmonicCount);let sum=0,ref=0,used=0;for(let n=1;n<=N;n++){if(!harmonicAllows(type,n,c))continue;let w=harmonicWeight(n,c)*harmonicSign(type,n);if(type==='triangle')w=harmonicSign(type,n)/Math.pow(n,Math.max(0.0001,c.harmonicRolloff+1));sum+=w*Math.sin(2*Math.PI*phaseAt(t,c,n));ref+=w*Math.sin(n*Math.PI/2);used++}if(!used||Math.abs(ref)<1e-9)return unit(type,phaseAt(t,c,1),c.duty,c.sharkExp,c);return sum/Math.abs(ref)}
function env(t,c){const x=clamp(t-c.startTime,0,c.duration),dur=c.duration,relStart=Math.max(0,dur-c.release),s=c.sustain,k=c.envExp;if(x>=relStart&&c.release>0){let base=1;if(relStart>c.attack+c.decay)base=s;else if(relStart>c.attack&&c.decay>0)base=1-(1-s)*exp01((relStart-c.attack)/c.decay,k);else if(c.attack>0)base=exp01(relStart/c.attack,k);return base*(1-exp01((x-relStart)/c.release,k))}if(c.attack>0&&x<c.attack)return exp01(x/c.attack,k);if(c.decay>0&&x<c.attack+c.decay)return 1-(1-s)*exp01((x-c.attack)/c.decay,k);return s}
function sampleGenerated(t,c){const base=unit(c.waveform,phaseAt(t,c,1),c.duty,c.sharkExp,c);let shaped=base;if(c.harmonicsEnable&&c.harmonicCount>=2&&c.harmonicAmount>0){const rich=harmonicWave(t,c),a=c.harmonicAmount;shaped=a<=1?base+(rich-base)*a:rich+(rich-base)*(a-1)}return c.offset+c.amplitude*shaped*env(t,c)}
function generatedRows(c){const n=Math.max(2,Math.floor(c.duration*c.sampleRate)+1),dt=c.duration/(n-1),a=new Array(n);for(let i=0;i<n;i++){const t=c.startTime+i*dt;a[i]={t,y:sampleGenerated(t,c)}}return a}
function wavRows(c){if(!wavState)return generatedRows(c);const src=wavState.samples,srcN=src.length,outRate=c.sampleRate;let outN,dur;if(c.wavPlaybackMode==='preserveDuration'){dur=srcN/wavState.sampleRate;outN=Math.max(2,Math.floor(dur*outRate)+1)}else{outN=srcN;dur=srcN/outRate}els.duration.value=fmt(dur);c.duration=dur;const a=new Array(outN);for(let i=0;i<outN;i++){let srcIndex;if(c.wavPlaybackMode==='preserveDuration'){srcIndex=i*(wavState.sampleRate/outRate)}else{srcIndex=i}const i0=Math.floor(clamp(srcIndex,0,srcN-1)),i1=Math.min(srcN-1,i0+1),f=srcIndex-i0;const v=src[i0]*(1-f)+src[i1]*f;const t=c.startTime+i/outRate;a[i]={t,y:c.wavOffset+c.wavGain*v*env(t,c)}}return a}
function makeRows(c){return c.sourceMode==='wav'&&wavState?wavRows(c):generatedRows(c)}
function csv(d,c){let rows=[];if(c.csvFormat==='linmotVectorHeader')rows.push('value');if(c.csvFormat==='timeValue')rows.push('time_s,value');for(const r of d){if(c.csvFormat==='linmotVector'||c.csvFormat==='linmotVectorHeader')rows.push(fmt(r.y));else rows.push(fmt(r.t)+','+fmt(r.y))}return rows.join('\n')}
function preview(s){const lines=s.split('\n');return lines.slice(0,28).join('\n')+(lines.length>28?'\n... '+(lines.length-28)+' more rows':'')}
function decimate(d,max){if(d.length<=max)return d;const step=Math.ceil(d.length/max),out=[];for(let i=0;i<d.length;i+=step)out.push(d[i]);if(out[out.length-1]!==d[d.length-1])out.push(d[d.length-1]);return out}
function sizeCanvas(cv){const r=cv.getBoundingClientRect(),dpr=devicePixelRatio||1;cv.width=Math.max(500,Math.round(r.width*dpr));cv.height=Math.max(260,Math.round(r.height*dpr));return{w:cv.width,h:cv.height,dpr}}
function draw(d){if(!d.length)return;const cv=els.chart,ctx=cv.getContext('2d'),s=sizeCanvas(cv),w=s.w,h=s.h,dpr=s.dpr,p={l:62*dpr,r:14*dpr,t:14*dpr,b:38*dpr};ctx.clearRect(0,0,w,h);ctx.fillStyle='#080a0a';ctx.fillRect(0,0,w,h);let minX=d[0].t,maxX=d[d.length-1].t,minY=Infinity,maxY=-Infinity;for(const r of d){if(r.y<minY)minY=r.y;if(r.y>maxY)maxY=r.y}if(minX===maxX){minX-=1;maxX+=1}if(minY===maxY){minY-=1;maxY+=1}let ym=(maxY-minY)*.12;minY-=ym;maxY+=ym;const pw=w-p.l-p.r,ph=h-p.t-p.b,xp=x=>p.l+(x-minX)/(maxX-minX)*pw,yp=y=>p.t+(1-(y-minY)/(maxY-minY))*ph;ctx.font=(10*dpr)+'px Cascadia Mono, Consolas, monospace';ctx.lineWidth=1*dpr;ctx.strokeStyle='rgba(210,220,216,.13)';ctx.fillStyle='#8c9692';ctx.textAlign='right';ctx.textBaseline='middle';for(let i=0;i<=8;i++){let f=i/8,y=p.t+f*ph,val=maxY-f*(maxY-minY);ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();ctx.fillText(fmtAxisY(val),p.l-7*dpr,y)}ctx.textAlign='center';ctx.textBaseline='top';for(let i=0;i<=8;i++){let f=i/8,x=p.l+f*pw,val=minX+f*(maxX-minX);ctx.beginPath();ctx.moveTo(x,p.t);ctx.lineTo(x,h-p.b);ctx.stroke();ctx.fillText(fmt(val),x,h-p.b+7*dpr)}let zy=yp(0);if(zy>=p.t&&zy<=h-p.b){ctx.strokeStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.moveTo(p.l,zy);ctx.lineTo(w-p.r,zy);ctx.stroke()}ctx.strokeStyle='#00e06f';ctx.lineWidth=2*dpr;ctx.beginPath();for(let i=0;i<d.length;i++){let x=xp(d[i].t),y=yp(d[i].y);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke();ctx.strokeStyle='#586062';ctx.strokeRect(p.l,p.t,pw,ph)}
function clampAudio(v){return Math.max(-1,Math.min(1,v))}
function makeWav(rows,c){const sr=c.sampleRate,ch=1,bits=16,bps=bits/8,dataSize=rows.length*ch*bps,buf=new ArrayBuffer(44+dataSize),view=new DataView(buf);function ws(o,str){for(let i=0;i<str.length;i++)view.setUint8(o+i,str.charCodeAt(i))}ws(0,'RIFF');view.setUint32(4,36+dataSize,true);ws(8,'WAVE');ws(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,ch,true);view.setUint32(24,sr,true);view.setUint32(28,sr*ch*bps,true);view.setUint16(32,ch*bps,true);view.setUint16(34,bits,true);ws(36,'data');view.setUint32(40,dataSize,true);let o=44;for(const r of rows){const v=clampAudio(r.y);view.setInt16(o,v<0?v*0x8000:v*0x7fff,true);o+=2}return buf}
async function loadWavFile(file){try{const buf=await file.arrayBuffer();const ac=new (window.AudioContext||window.webkitAudioContext)();const audio=await ac.decodeAudioData(buf.slice(0));const frames=audio.length,channels=audio.numberOfChannels,samples=new Float32Array(frames);for(let ch=0;ch<channels;ch++){const data=audio.getChannelData(ch);for(let i=0;i<frames;i++)samples[i]+=data[i]/channels}wavState={samples,sampleRate:audio.sampleRate,channels,frames,name:file.name};els.sourceMode.value='wav';els.wavInfo.innerHTML=`<span class="modepill">loaded</span> ${file.name}<br>${frames.toLocaleString()} samples / ${audio.sampleRate} Hz / ${channels} ch`;saveLastSetup();update();setMsg('wav loaded','ok')}catch(e){wavState=null;els.wavInfo.textContent='decode failed';setMsg('wav decode failed','err');console.error(e)}}
function storeGet(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
function storeSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){setMsg('local save unavailable','err');return false}}
function captureSetup(){const out={};for(const id of SETUP_IDS){const el=els[id];if(el)out[id]=el.type==='checkbox'?el.checked:el.value}return out}
function applySetup(setup){if(!setup)return;for(const id of SETUP_IDS){if(setup[id]!==undefined&&els[id]){if(els[id].type==='checkbox')els[id].checked=!!setup[id];else els[id].value=setup[id]}}}
function saveLastSetup(){storeSet(STORAGE_LAST,captureSetup())}
function loadLastSetup(){applySetup(storeGet(STORAGE_LAST,null))}
function getPresets(){return storeGet(STORAGE_PRESETS,{})||{}}
function setPresets(p){return storeSet(STORAGE_PRESETS,p)}
function refreshPresetList(selected=''){const names=Object.keys(getPresets()).sort((a,b)=>a.localeCompare(b));els.presetSelect.innerHTML='';if(!names.length){const o=document.createElement('option');o.value='';o.textContent='no saved presets';els.presetSelect.appendChild(o);return}for(const name of names){const o=document.createElement('option');o.value=name;o.textContent=name;els.presetSelect.appendChild(o)}if(selected&&names.includes(selected))els.presetSelect.value=selected}
function saveNamedPreset(){let name=els.presetName.value.trim();if(!name)name=settingsFilename('csv').replace(/\.csv$/,'');const p=getPresets();p[name]=captureSetup();setPresets(p);els.presetName.value=name;refreshPresetList(name);saveLastSetup();setMsg('saved setup '+name,'ok')}
function loadNamedPreset(){const name=els.presetSelect.value,setup=getPresets()[name];if(!name||!setup){setMsg('no setup selected','err');return}applySetup(setup);els.presetName.value=name;assignFreshFilename();applyAutoDuration();saveLastSetup();update();setMsg('loaded setup '+name,'ok')}
function deleteNamedPreset(){const name=els.presetSelect.value;if(!name){setMsg('no setup selected','err');return}const p=getPresets();delete p[name];setPresets(p);refreshPresetList();setMsg('deleted setup '+name,'ok')}
function applyAutoDuration(){const c=cfg(false);if(c.sourceMode==='wav'&&wavState){return}if(c.sweepEnable&&c.sweepSetsDuration){els.duration.value=fmt(c.sweepTime);return}if(c.autoSingleCycle&&!c.sweepEnable&&c.frequency>0){els.duration.value=fmt(1/c.frequency)}}
function update(){assignFreshFilename(false);const c=cfg();const estimated=Math.floor(c.duration*c.sampleRate)+1;if(c.sourceMode!=='wav'&&estimated>1000000){setMsg('too many points','err');return}latestRows=makeRows(c);if(latestRows.length>1000000){setMsg('too many points','err');return}latest=csv(latestRows,c);draw(decimate(latestRows,c.chartPoints));els.csvPreview.value=preview(latest);els.pointsShort.textContent=latestRows.length.toLocaleString()+' pts';els.formatShort.textContent=c.csvFormat.includes('linmot')?'VECTOR':'TIME';const mode=c.sourceMode==='wav'?'wav import':(c.sweepEnable?'sweep':'generated');setMsg(mode+' / curve time '+fmt(c.duration*1000)+' ms')}
function downloadCsv(){const fresh=assignFreshFilename(true);update();const blob=new Blob([latest],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=fresh;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);setMsg('downloaded '+fresh,'ok')}
function downloadWav(){assignFreshFilename(true);update();const c=cfg(),name=(els.filename.value||settingsFilename('csv')).replace(/\.csv$/i,'.wav');const blob=new Blob([makeWav(latestRows,c)],{type:'audio/wav'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);setMsg('downloaded '+name,'ok')}
async function copyCsv(){update();try{await navigator.clipboard.writeText(latest);setMsg('copied','ok')}catch(e){setMsg('copy failed','err')}} 
for(const id of SETUP_IDS){const e=els[id];if(e){const handler=()=>{if(['frequency','autoSingleCycle','sweepEnable','sweepTime','sweepSetsDuration','sourceMode'].includes(id))applyAutoDuration();saveLastSetup();update()};e.addEventListener('input',handler);e.addEventListener('change',handler)}}
els.wavFile.addEventListener('change',()=>{const file=els.wavFile.files&&els.wavFile.files[0];if(file)loadWavFile(file)});
els.filename.addEventListener('input',update);els.filename.addEventListener('change',update);els.downloadBtn.addEventListener('click',downloadCsv);els.downloadWavBtn.addEventListener('click',downloadWav);els.copyBtn.addEventListener('click',copyCsv);els.savePresetBtn.addEventListener('click',saveNamedPreset);els.loadPresetBtn.addEventListener('click',loadNamedPreset);els.deletePresetBtn.addEventListener('click',deleteNamedPreset);els.presetSelect.addEventListener('change',()=>{els.presetName.value=els.presetSelect.value});addEventListener('resize',update);
loadLastSetup();refreshPresetList();assignFreshFilename();applyAutoDuration();saveLastSetup();update();
</script>
